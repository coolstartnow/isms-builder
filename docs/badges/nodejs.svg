    <text x="280" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="340" lengthAdjust="spacing">Node.js</text>
    <text x="280" y="140" transform="scale(.1)" textLength="340" lengthAdjust="spacing">Node.js</text>
    <text x="780" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="300" lengthAdjust="spacing">18+</text>
